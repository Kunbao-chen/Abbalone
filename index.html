<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智推棋 Abalone - 視覺優化修正版</title>
    <style>
        /* 手術刀協議：精確修正反白問題 */
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ececec;
            margin: 0;
            padding: 20px;
            /* 禁止整個頁面被意外選取 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .info {
            background: white;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
            pointer-events: none; /* 防止點擊文字內容時觸發反白 */
        }
        canvas {
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            /* 針對 Canvas 強化禁止選取 */
            -webkit-tap-highlight-color: transparent;
        }
        .status {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .score-board {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #e74c3c;
        }
        .hint {
            font-size: 0.85rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="info">
    <div id="status" class="status">黑棋回合</div>
    <div id="score" class="score-board">黑 0 : 0 白</div>
    <div class="hint">選取 1-3 顆連線棋子，點擊鄰近空格或敵棋推動（限移一格）</div>
</div>

<canvas id="gameBoard" width="550" height="550"></canvas>

<script>
    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const HEX_SIZE = 32;
    const OFFSET = { x: 275, y: 275 };

    let board = {}; 
    let turn = 1; 
    let selected = []; 
    let score = { 1: 0, 2: 0 };

    const DIRS = [
        {q: 1, r: 0}, {q: 1, r: -1}, {q: 0, r: -1},
        {q: -1, r: 0}, {q: -1, r: 1}, {q: 0, r: 1}
    ];

    function init() {
        for (let q = -4; q <= 4; q++) {
            for (let r = -4; r <= 4; r++) {
                if (Math.abs(q + r) <= 4) {
                    let val = 0;
                    if (r <= -3 || (r == -2 && q >= 0)) val = 2; 
                    if (r >= 3 || (r == 2 && q <= 0)) val = 1;   
                    board[`${q},${r}`] = val;
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, 550, 550);
        for (let key in board) {
            let [q, r] = key.split(',').map(Number);
            let x = HEX_SIZE * (1.5 * q) + OFFSET.x;
            let y = HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r) + OFFSET.y;

            ctx.beginPath();
            ctx.arc(x, y, HEX_SIZE * 0.85, 0, Math.PI*2);
            ctx.fillStyle = "#ddd";
            ctx.fill();

            if (board[key] > 0) {
                ctx.beginPath();
                ctx.arc(x, y, HEX_SIZE * 0.7, 0, Math.PI*2);
                ctx.fillStyle = board[key] === 1 ? "#333" : "#fff";
                ctx.fill();
                
                let isSelected = selected.some(s => s.q == q && s.r == r);
                ctx.strokeStyle = isSelected ? "#f1c40f" : "#000";
                ctx.lineWidth = isSelected ? 4 : 1;
                ctx.stroke();
            }
        }
    }

    // 修正：防止滑鼠雙擊導致選取反白
    canvas.onmousedown = (e) => {
        e.preventDefault(); 
    };

    canvas.onclick = (e) => {
        e.preventDefault();
        let rect = canvas.getBoundingClientRect();
        let x = e.clientX - rect.left - OFFSET.x;
        let y = e.clientY - rect.top - OFFSET.y;
        let q = Math.round((2/3 * x) / HEX_SIZE);
        let r = Math.round((-1/3 * x + Math.sqrt(3)/3 * y) / HEX_SIZE);
        let key = `${q},${r}`;

        if (board[key] === undefined) return;

        if (board[key] === turn) {
            if (selected.some(s => s.q === q && s.r === r)) {
                selected = [];
            } else {
                if (selected.length < 3) selected.push({q, r});
                else selected = [{q, r}];
            }
        } else {
            if (selected.length > 0) attemptMove({q, r});
        }
        draw();
    };

    function attemptMove(target) {
        let head = selected[selected.length - 1];
        let dq = target.q - head.q;
        let dr = target.r - head.r;
        
        if (!DIRS.some(d => d.q === dq && d.r === dr)) return;

        let myCount = selected.length;
        let opponentCount = 0;
        
        let curr = { q: target.q, r: target.r };
        while (board[`${curr.q},${curr.r}`] !== undefined && board[`${curr.q},${curr.r}`] !== 0) {
            if (board[`${curr.q},${curr.r}`] === turn) return; 
            opponentCount++;
            curr.q += dq;
            curr.r += dr;
        }

        if (myCount > opponentCount) {
            let tempBoard = {...board};
            selected.forEach(s => tempBoard[`${s.q},${s.r}`] = 0);
            selected.forEach(s => {
                tempBoard[`${s.q + dq},${s.r + dr}`] = turn;
            });
            
            let oppColor = (turn === 1 ? 2 : 1);
            for (let i = 1; i <= opponentCount; i++) {
                let nQ = target.q + (dq * i);
                let nR = target.r + (dr * i);
                let nKey = `${nQ},${nR}`;
                
                if (board[nKey] === undefined) {
                    score[turn]++;
                } else {
                    tempBoard[nKey] = oppColor;
                }
            }
            board = tempBoard;
            nextTurn();
        }
    }

    function nextTurn() {
        turn = turn === 1 ? 2 : 1;
        selected = [];
        document.getElementById('status').innerText = turn === 1 ? "黑棋回合" : "白棋回合";
        document.getElementById('score').innerText = `黑 ${score[1]} : ${score[2]} 白`;
        if (score[1] >= 6 || score[2] >= 6) {
            alert("遊戲結束！" + (score[1] >= 6 ? "黑棋" : "白棋") + "獲勝！");
            location.reload();
        }
    }

    init();
    draw();
</script>
</body>
</html>
