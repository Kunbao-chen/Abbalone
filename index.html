<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智推棋 Abalone - 完整推擠版</title>
    <style>
        body { font-family: "PingFang TC", sans-serif; display: flex; flex-direction: column; align-items: center; background: #ececec; }
        .info { margin: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        canvas { background: #fafafa; border-radius: 50%; box-shadow: inset 0 0 20px rgba(0,0,0,0.1); cursor: crosshair; }
        .status { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        .score { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="info">
    <div class="status" id="status">黑棋回合</div>
    <div id="score">黑 0 : 0 白</div>
    <div style="font-size: 0.8rem; color: #7f8c8d; margin-top: 5px;">
        選取 1-3 顆連線棋子，點擊目標位置推動。
    </div>
</div>

<canvas id="gameBoard" width="550" height="550"></canvas>

<script>
const canvas = document.getElementById('gameBoard');
const ctx = canvas.getContext('2d');
const HEX_SIZE = 32;
const OFFSET = { x: 275, y: 275 };

let board = {}; 
let turn = 1; // 1: 黑, 2: 白
let selected = []; 
let score = { 1: 0, 2: 0 };

// 方向向量 (q, r)
const DIRS = [
    {q: 1, r: 0}, {q: 1, r: -1}, {q: 0, r: -1},
    {q: -1, r: 0}, {q: -1, r: 1}, {q: 0, r: 1}
];

function init() {
    for (let q = -4; q <= 4; q++) {
        for (let r = -4; r <= 4; r++) {
            if (Math.abs(q + r) <= 4) {
                let val = 0;
                if (r <= -3 || (r == -2 && q >= 0)) val = 2; // 白
                if (r >= 3 || (r == 2 && q <= 0)) val = 1;   // 黑
                board[`${q},${r}`] = val;
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, 550, 550);
    for (let key in board) {
        let [q, r] = key.split(',').map(Number);
        let x = HEX_SIZE * (1.5 * q) + OFFSET.x;
        let y = HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r) + OFFSET.x;

        ctx.beginPath();
        ctx.arc(x, y, HEX_SIZE * 0.85, 0, Math.PI*2);
        ctx.fillStyle = "#ddd";
        ctx.fill();

        if (board[key] > 0) {
            ctx.beginPath();
            ctx.arc(x, y, HEX_SIZE * 0.7, 0, Math.PI*2);
            ctx.fillStyle = board[key] === 1 ? "#333" : "#fff";
            ctx.fill();
            ctx.strokeStyle = selected.some(s => s.q==q && s.r==r) ? "#f1c40f" : "#000";
            ctx.lineWidth = selected.some(s => s.q==q && s.r==r) ? 4 : 1;
            ctx.stroke();
        }
    }
}

canvas.onclick = (e) => {
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left - OFFSET.x;
    let y = e.clientY - rect.top - OFFSET.y;
    let q = Math.round((2/3 * x) / HEX_SIZE);
    let r = Math.round((-1/3 * x + Math.sqrt(3)/3 * y) / HEX_SIZE);
    let key = `${q},${r}`;

    if (board[key] === undefined) return;

    if (board[key] === turn) {
        // 選取邏輯：必須連成一線且不超過3顆
        if (selected.some(s => s.q === q && s.r === r)) {
            selected = [];
        } else {
            if (selected.length < 3) selected.push({q, r});
            else selected = [{q, r}];
        }
    } else {
        if (selected.length > 0) attemptMove({q, r});
    }
    draw();
};

function attemptMove(target) {
    // 找出移動方向
    let head = selected[selected.length - 1];
    let dq = target.q - head.q;
    let dr = target.r - head.r;
    
    // 確保是相鄰移動
    if (!DIRS.some(d => d.q === dq && d.r === dr)) return;

    let moveList = [...selected];
    let myCount = moveList.length;
    let opponentCount = 0;
    
    // 檢查推擠線路上對手棋子
    let curr = { q: target.q, r: target.r };
    while (board[`${curr.q},${curr.r}`] !== undefined && board[`${curr.q},${curr.r}`] !== 0) {
        if (board[`${curr.q},${curr.r}`] === turn) return; // 撞到自己的棋子，不能推
        opponentCount++;
        curr.q += dq;
        curr.r += dr;
    }

    // 智推棋核心：多推少
    if (myCount > opponentCount) {
        // 從末端開始位移（避免覆蓋）
        let pushPath = [];
        let p = { q: head.q, r: head.r };
        for(let i=0; i < myCount + opponentCount; i++){
            p.q += dq; p.r += dr;
            pushPath.push({ ...p });
        }

        // 執行位移
        let lastVal = 0;
        let tempBoard = {...board};
        
        // 清除原本位置
        selected.forEach(s => tempBoard[`${s.q},${s.r}`] = 0);
        
        // 依序填入
        let currentPos = {q: head.q, r: head.r};
        for(let i=0; i < myCount; i++){
            currentPos.q += dq; currentPos.r += dr;
            tempBoard[`${currentPos.q},${currentPos.r}`] = turn;
        }
        
        let oppPos = {q: currentPos.q, r: currentPos.r};
        for(let i=0; i < opponentCount; i++){
            oppPos.q += dq; oppPos.r += dr;
            let key = `${oppPos.q},${oppPos.r}`;
            if (board[key] === undefined) {
                score[turn]++; // 出界得分
            } else {
                tempBoard[key] = (turn === 1 ? 2 : 1);
            }
        }

        board = tempBoard;
        nextTurn();
    }
}

function nextTurn() {
    turn = turn === 1 ? 2 : 1;
    selected = [];
    document.getElementById('status').innerText = turn === 1 ? "黑棋回合" : "白棋回合";
    document.getElementById('score').innerText = `黑 ${score[1]} : ${score[2]} 白`;
    if (score[1] >= 6 || score[2] >= 6) alert("遊戲結束！");
}

init();
draw();
</script>
</body>
</html>
