<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamy Lobby v1.0.0</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* 手術位置 1: 新增玄關頁面專用樣式與版本小字樣式 */
        #mode-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
            color: white; font-family: sans-serif;
        }
        .mode-box { width: 80%; max-width: 350px; text-align: center; }
        .mode-box h2 { color: #3498db; margin-bottom: 20px; font-size: 1.4rem; }
        .menu-btn {
            width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-main { background: #34495e; color: white; border: 1px solid #5d6d7e; }
        .btn-main:active { background: #2c3e50; transform: scale(0.98); }
        .btn-cancel { background: transparent; color: #95a5a6; border: 1px solid #95a5a6; margin-top: 20px; }
        .btn-sub { background: #2980b9; color: white; }
        
        #version-tag {
            position: fixed; bottom: 5px; right: 5px; font-size: 10px; 
            color: rgba(255, 255, 255, 0.3); pointer-events: none; z-index: 9999;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1 id="lobby-title">🎮 GAMY LOBBY</h1>
    <div id="lobby" class="lobby-container">
        <div class="loading">正在開啟遊戲大門...</div>
    </div>

    <div id="version-tag">Lobby v1.0.0</div>

    <div id="mode-overlay">
        <div class="mode-box" id="mode-selection-main">
            <h2 id="display-game-name">遊戲名稱</h2>
            <button class="menu-btn btn-main" onclick="launchGame('pvp')">Player versus Player</button>
            <button class="menu-btn btn-main" onclick="launchGame('pvr')">Player versus Robot</button>
            <button class="menu-btn btn-main" onclick="showPIRSubMenu()">Play in Room</button>
            <button class="menu-btn btn-cancel" onclick="closeModeMenu()">取消退出</button>
        </div>
        
        <div class="mode-box" id="mode-selection-pir" style="display:none;">
            <h2 id="display-game-name-pir">Play in Room</h2>
            <button class="menu-btn btn-sub" onclick="launchGame('pir', 'player')">Player go</button>
            <button class="menu-btn btn-sub" onclick="launchGame('pir', 'robot')">Robot go</button>
            <button class="menu-btn btn-cancel" onclick="backToMain()">回到上層</button>
        </div>
    </div>

    <script>
        // 全域變數暫存當前選擇的遊戲路徑
        let selectedGamePath = "";

        async function initializeLobby() {
            try {
                const v = new Date().getTime();
                const [cssRes, gameRes] = await Promise.all([
                    fetch(`style_config.csv?v=${v}`),
                    fetch(`folder.csv?v=${v}`)
                ]);

                if (!cssRes.ok || !gameRes.ok) throw new Error("檔案讀取失敗");

                const cssText = await cssRes.text();
                const gameText = await gameRes.text();

                applyDynamicStyles(cssText);
                renderGameList(gameText);

            } catch (error) {
                console.error('Lobby Error:', error);
                document.getElementById('lobby').innerHTML = '配置讀取錯誤，請檢查檔案名稱。';
            }
        }

        function applyDynamicStyles(csv) {
            const rows = csv.split('\n').filter(row => row.trim() !== '');
            let styleString = "";
            for (let i = 1; i < rows.length; i++) {
                const [selector, property, value] = rows[i].split(',').map(item => item.trim());
                if (selector && property && value) {
                    styleString += `${selector} { ${property}: ${value}; }\n`;
                }
            }
            const styleTag = document.createElement('style');
            styleTag.textContent = styleString;
            document.head.appendChild(styleTag);
        }

        function renderGameList(csv) {
            const rows = csv.split('\n').filter(row => row.trim() !== '');
            const headers = rows[0].split(',').map(h => h.trim());
            const container = document.getElementById('lobby');
            container.innerHTML = ''; 

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',').map(c => c.trim());
                const game = {};
                headers.forEach((h, idx) => game[h] = cols[idx]);

                const card = document.createElement('div');
                card.className = 'game-card';
                
                // 手術位置 4: 修改點擊事件，改為開啟玄關選單
                card.onclick = () => {
                    openModeMenu(game.display_name, `${game.folder_path}/${game.entry_file}`);
                };

                card.innerHTML = `
                    <div class=\"game-title\">${game.display_name}</div>
                    <div class=\"game-version\">V ${game.entry_file.split('.')[1] || '1.0'}</div>
                `;
                container.appendChild(card);
            }
        }

        // 手術位置 5: 玄關控制邏輯
        function openModeMenu(name, path) {
            document.getElementById('display-game-name').innerText = name;
            selectedGamePath = path;
            document.getElementById('mode-overlay').style.display = 'flex';
            backToMain(); 
        }

        function closeModeMenu() {
            document.getElementById('mode-overlay').style.display = 'none';
        }

        function showPIRSubMenu() {
            document.getElementById('mode-selection-main').style.display = 'none';
            document.getElementById('mode-selection-pir').style.display = 'block';
        }

        function backToMain() {
            document.getElementById('mode-selection-main').style.display = 'block';
            document.getElementById('mode-selection-pir').style.display = 'none';
        }

        function launchGame(mode, subtype = '') {
            // 目前 PIR 模式跳出工事中提示
            if (mode === 'pir') {
                alert("🚧 Play in Room 模式正在施工中，暫未開放雲端對戰。");
                return;
            }

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            setTimeout(() => {
                const finalUrl = `${selectedGamePath}?mode=${mode}${subtype ? '&type=' + subtype : ''}`;
                window.location.href = finalUrl;
            }, 150);
        }

        window.onload = initializeLobby;
    </script>
</body>
</html>
