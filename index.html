<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智推棋 (Abalone) 本地對戰</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        canvas { background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); cursor: pointer; margin-top: 20px; }
        .info { margin: 20px; text-align: center; }
        .status { font-size: 1.2rem; font-weight: bold; color: #333; }
        .controls { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="info">
    <div class="status" id="status">當前回合：黑棋 (先手)</div>
    <div class="controls">點擊棋子選取（最多3顆連線），點擊相鄰空格或敵方棋子進行移動/推擠</div>
    <div id="score">黑棋得分: 0 | 白棋得分: 0</div>
</div>

<canvas id="gameBoard" width="600" height="600"></canvas>

<script>
/**
 * 智推棋本地對戰邏輯簡化版
 */
const canvas = document.getElementById('gameBoard');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('status');
const scoreText = document.getElementById('score');

const HEX_SIZE = 35;
const BOARD_RADIUS = 4; // 邊長 5 的六角形
const OFFSET_X = canvas.width / 2;
const OFFSET_Y = canvas.height / 2;

let board = {}; // key: "q,r", value: 1 (黑), 2 (白)
let turn = 1; // 1: 黑, 2: 白
let selected = []; // 存儲選中的座標組 [{q,r}, ...]
let scores = { 1: 0, 2: 0 };

// 初始化棋盤
function initBoard() {
    for (let q = -BOARD_RADIUS; q <= BOARD_RADIUS; q++) {
        let r1 = Math.max(-BOARD_RADIUS, -q - BOARD_RADIUS);
        let r2 = Math.min(BOARD_RADIUS, -q + BOARD_RADIUS);
        for (let r = r1; r <= r2; r++) {
            board[`${q},${r}`] = 0; // 0 是空位
            
            // 初始擺放 (簡化版傳統佈局)
            if (r === -4 || r === -3 || (r === -2 && q >= 0 && q <= 2)) board[`${q},${r}`] = 2; // 白棋
            if (r === 4 || r === 3 || (r === 2 && q <= 0 && q >= -2)) board[`${q},${r}`] = 1; // 黑棋
        }
    }
}

// 座標轉換
function hexToPixel(q, r) {
    let x = HEX_SIZE * (3/2 * q);
    let y = HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r);
    return { x: x + OFFSET_X, y: y + OFFSET_Y };
}

function pixelToHex(x, y) {
    x -= OFFSET_X;
    y -= OFFSET_Y;
    let q = (2/3 * x) / HEX_SIZE;
    let r = (-1/3 * x + Math.sqrt(3)/3 * y) / HEX_SIZE;
    return axialRound(q, r);
}

function axialRound(q, r) {
    let s = -q - r;
    let rq = Math.round(q);
    let rr = Math.round(r);
    let rs = Math.round(s);
    let dq = Math.abs(rq - q);
    let dr = Math.abs(rr - r);
    let ds = Math.abs(rs - s);
    if (dq > dr && dq > ds) rq = -rr - rs;
    else if (dr > ds) rr = -rq - rs;
    return { q: rq, r: rr };
}

// 繪製
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for (let key in board) {
        let [q, r] = key.split(',').map(Number);
        let { x, y } = hexToPixel(q, r);
        
        // 畫格子
        ctx.beginPath();
        ctx.arc(x, y, HEX_SIZE * 0.8, 0, Math.PI * 2);
        ctx.fillStyle = "#e0e0e0";
        ctx.fill();
        ctx.strokeStyle = "#ccc";
        ctx.stroke();

        // 畫棋子
        if (board[key] !== 0) {
            ctx.beginPath();
            ctx.arc(x, y, HEX_SIZE * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = board[key] === 1 ? "#333" : "#fff";
            ctx.fill();
            ctx.strokeStyle = "#000";
            ctx.lineWidth = selected.some(s => s.q === q && s.r === r) ? 4 : 1;
            ctx.stroke();
        }
    }
}

// 點擊事件
canvas.addEventListener('click', (e) => {
    let rect = canvas.getBoundingClientRect();
    let hex = pixelToHex(e.clientX - rect.left, e.clientY - rect.top);
    let key = `${hex.q},${hex.r}`;

    if (board[key] === undefined) return;

    if (board[key] === turn) {
        // 選取邏輯 (簡單選取)
        if (selected.some(s => s.q === hex.q && s.r === hex.r)) {
            selected = [];
        } else {
            if (selected.length < 3) selected.push(hex);
            else selected = [hex];
        }
    } else {
        // 嘗試移動
        if (selected.length > 0) {
            handleMove(hex);
        }
    }
    draw();
});

function handleMove(targetHex) {
    // 這裡需要複雜的向量判斷來實作「推擠」
    // 為求範例精簡，此處僅實作「單顆移動」示意
    // 實務上需檢查選中棋子的連線性與目標方向
    let lastSel = selected[0];
    let keyFrom = `${lastSel.q},${lastSel.r}`;
    let keyTo = `${targetHex.q},${targetHex.r}`;

    if (board[keyTo] === 0) {
        board[keyTo] = turn;
        board[keyFrom] = 0;
        endTurn();
    }
}

function endTurn() {
    turn = turn === 1 ? 2 : 1;
    selected = [];
    statusText.innerText = `當前回合：${turn === 1 ? '黑棋' : '白棋'}`;
}

initBoard();
draw();
</script>
</body>
</html>
