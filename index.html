<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智推棋 Abalone - v1.4.4 路徑修正版</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none; -ms-user-select: none;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background: #ececec; margin: 0; padding: 20px;
        }
        .info {
            background: white; padding: 15px 30px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; margin-bottom: 10px;
        }
        .game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        canvas {
            background: #fff; border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); cursor: pointer;
            touch-action: manipulation; 
        }
        .btn-zone { height: 60px; display: flex; align-items: center; justify-content: center; width: 100%; }
        .ok-btn {
            padding: 10px 40px; font-size: 1.1rem; cursor: pointer; border: none;
            border-radius: 8px; background: #2ecc71; color: white; font-weight: bold;
            box-shadow: 0 4px 0 #27ae60;
        }
        .ok-btn:disabled { background: #bdc3c7; box-shadow: 0 4px 0 #95a5a6; cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body onselectstart="return false;">

<div class="info">
    <div id="status" class="status" style="font-size: 1.5rem; font-weight: bold;">黑棋回合</div>
    <div id="score" style="font-size: 1.2rem; margin: 5px 0; color: #e74c3c;">黑 0 : 0 白</div>
</div>

<div class="game-container">
    <div class="btn-zone">
        <button id="okBtnTop" class="ok-btn" disabled onclick="executeMove()">確定</button>
    </div>

    <canvas id="gameBoard" width="550" height="550"></canvas>

    <div class="btn-zone">
        <button id="okBtnBottom" class="ok-btn" disabled onclick="executeMove()">確定</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const HEX_SIZE = 32;
    const OFFSET = { x: 275, y: 275 };

    let board = {}; let tempBoard = null; let turn = 1; 
    let selectedTail = null; let legalTargets = [];   
    let previewTarget = null; let score = { 1: 0, 2: 0 };

    const DIRS = [{q:1,r:-1},{q:1,r:0},{q:0,r:1},{q:-1,r:1},{q:-1,r:0},{q:0,r:-1}];

    function init() {
        for (let q = -4; q <= 4; q++) {
            for (let r = -4; r <= 4; r++) {
                if (Math.abs(q + r) <= 4) {
                    let val = 0;
                    if (r <= -3) val = 2;
                    if (r == -2 && (q == 0 || q == 1 || q == 2)) val = 2;
                    if (r >= 3) val = 1;
                    if (r == 2 && (q == 0 || q == -1 || q == -2)) val = 1;
                    board[`${q},${r}`] = val;
                }
            }
        }
    }

    function hexToPixel(q, r) {
        return { x: HEX_SIZE * Math.sqrt(3) * (q + r/2) + OFFSET.x, y: HEX_SIZE * (3/2) * r + OFFSET.y };
    }

    function pixelToHex(x, y) {
        x -= OFFSET.x; y -= OFFSET.y;
        let q = (Math.sqrt(3)/3 * x - 1/3 * y) / HEX_SIZE, r = (2/3 * y) / HEX_SIZE;
        return hexRound(q, r);
    }

    function hexRound(q, r) {
        let s = -q-r; let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
        let dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
        if (dq > dr && dq > ds) rq = -rr-rs; else if (dr > ds) rr = -rq-rs;
        return {q: rq, r: rr};
    }

    /**
     * [手術刀協議 - 精確修正]
     * 修正紅圈顯示邏輯，確保「被推動的敵棋」格點也顯示紅圈。
     */
    function draw() {
        ctx.clearRect(0, 0, 550, 550);
        for (let key in board) {
            let [q, r] = key.split(',').map(Number);
            let {x, y} = hexToPixel(q, r);

            // 繪製背景槽
            ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.85, 0, Math.PI*2);
            ctx.fillStyle = "#ddd"; ctx.fill();

            // [邏輯優化] 掃描是否在此格顯示紅圈
            let shouldShowRedCircle = false;
            legalTargets.forEach(t => {
                // 1. 目的地 (車頭新位置) 一定有紅圈
                if (q === t.q && r === t.r) shouldShowRedCircle = true;
                
                // 2. [關鍵] 檢查目的地與原車頭之間的所有敵棋格點
                // 敵棋數量為 t.oppCount，它們都在目的地之後的路上
                for (let i = 0; i < t.oppCount; i++) {
                    let checkQ = t.q + t.dir.q * i;
                    let checkR = t.r + t.dir.r * i;
                    if (q === checkQ && r === checkR) shouldShowRedCircle = true;
                }
            });

            if (shouldShowRedCircle) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.5, 0, Math.PI*2);
                ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 3; ctx.stroke();
            }

            // 綠圈預覽標記
            if (previewTarget && previewTarget.q === q && previewTarget.r === r) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.75, 0, Math.PI*2);
                ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 5; ctx.stroke();
            }

            // 繪製棋子
            if (board[key] > 0) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.7, 0, Math.PI*2);
                ctx.fillStyle = board[key] === 1 ? "#333" : "#fff"; ctx.fill();
                let isTail = selectedTail && selectedTail.q === q && selectedTail.r === r;
                ctx.strokeStyle = isTail ? "#f1c40f" : "#000";
                ctx.lineWidth = isTail ? 4 : 1; ctx.stroke();
            }
        }
    }

    canvas.onclick = (e) => {
        let rect = canvas.getBoundingClientRect();
        let {q, r} = pixelToHex(e.clientX - rect.left, e.clientY - rect.top);
        let key = `${q},${r}`;
        if (board[key] === undefined) return;

        if (board[key] === turn) {
            tempBoard = null; previewTarget = null;
            selectedTail = {q, r};
            calculateLegalMoves(q, r);
        } 
        else if (legalTargets.some(t => t.q === q && t.r === r)) {
            let moveInfo = legalTargets.find(t => t.q === q && t.r === r);
            previewTarget = {q, r}; 
            prepareMove(moveInfo);   
        }
        updateButtons(); draw();
    };

    function calculateLegalMoves(q, r) {
        legalTargets = [];
        DIRS.forEach(dir => {
            let allies = [{q, r}];
            for (let i = 1; i < 3; i++) {
                let cQ = q + dir.q * i, cR = r + dir.r * i;
                if (board[`${cQ},${cR}`] === turn) allies.push({q: cQ, r: cR}); else break;
            }
            let myPower = allies.length, head = allies[allies.length - 1];
            let oppCount = 0, canMove = true;
            let scanPos = { q: head.q + dir.q, r: head.r + dir.r };

            while (board[`${scanPos.q},${scanPos.r}`] !== undefined && board[`${scanPos.q},${scanPos.r}`] !== 0) {
                if (board[`${scanPos.q},${scanPos.r}`] === turn) { canMove = false; break; }
                oppCount++;
                scanPos.q += dir.q; scanPos.r += dir.r;
            }
            if (canMove && myPower > oppCount) {
                legalTargets.push({ q: head.q + dir.q, r: head.r + dir.r, dir, allies, oppCount });
            }
        });
    }

    function prepareMove(moveInfo) {
        tempBoard = {...board};
        moveInfo.allies.forEach(s => tempBoard[`${s.q},${s.r}`] = 0);
        moveInfo.allies.forEach(s => tempBoard[`${s.q + moveInfo.dir.q},${s.r + moveInfo.dir.r}`] = turn);
        let oppColor = (turn === 1 ? 2 : 1);
        if (moveInfo.oppCount > 0) {
            for (let i = moveInfo.oppCount; i >= 1; i--) {
                let oQ = moveInfo.q + moveInfo.dir.q * (i-1), oR = moveInfo.r + moveInfo.dir.r * (i-1);
                let next = { q: oQ + moveInfo.dir.q, r: oR + moveInfo.dir.r };
                if (board[`${next.q},${next.r}`] !== undefined) tempBoard[`${next.q},${next.r}`] = oppColor;
            }
        }
    }

    function executeMove() {
        let oppColor = (turn === 1 ? 2 : 1);
        let bCount = Object.values(board).filter(v => v === oppColor).length;
        let aCount = Object.values(tempBoard).filter(v => v === oppColor).length;
        score[turn] += (bCount - aCount);
        board = tempBoard;
        tempBoard = null; selectedTail = null; legalTargets = []; previewTarget = null;
        turn = (turn === 1) ? 2 : 1;
        updateUI();
    }

    function updateButtons() {
        const topBtn = document.getElementById('okBtnTop'), bottomBtn = document.getElementById('okBtnBottom');
        topBtn.disabled = true; bottomBtn.disabled = true;
        if (tempBoard) { if (turn === 1) bottomBtn.disabled = false; else topBtn.disabled = false; }
    }

    function updateUI() {
        document.getElementById('status').innerText = turn === 1 ? "黑棋回合" : "白棋回合";
        document.getElementById('score').innerText = `黑 ${score[1]} : ${score[2]} 白`;
        updateButtons(); draw();
    }

    init(); draw();
</script>
</body>
</html>
