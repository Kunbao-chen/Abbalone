<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智推棋 Abalone - v1.8.0</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        html, body { overscroll-behavior: none; height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #ececec; font-family: sans-serif; }
        
        /* 橫屏警告遮罩 */
        #portrait-lock {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50; color: white; z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        @media (orientation: landscape) and (max-height: 500px) { #portrait-lock { display: flex; } }

        /* 頂部控制列 */
        .top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 100;
        }

        /* 圓形進度條重置按鈕 */
        .reset-wrapper { position: relative; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .reset-wrapper svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; pointer-events: none; }
        .reset-wrapper circle { fill: none; stroke-width: 4; stroke-linecap: round; }
        .bg-circle { stroke: rgba(0,0,0,0.1); }
        .progress-circle { stroke: #e74c3c; stroke-dasharray: 126; stroke-dashoffset: 126; transition: stroke-dashoffset 0.1s linear; }
        .reset-trigger {
            width: 36px; height: 36px; border-radius: 50%; background: #95a5a6; border: none;
            color: white; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 2;
        }

        .exit-btn {
            padding: 8px 16px; background: #e74c3c; color: white; border: none;
            border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #c0392b;
        }

        /* 遊戲主容器：確保在 PC 不會破版 */
        .main-layout {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; width: 100%; max-width: 500px; margin: 0 auto; padding-top: 40px;
        }

        canvas {
            width: 90vmin; height: 90vmin; max-width: 450px; max-height: 450px;
            background: #fff; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            touch-action: none; margin: 10px 0;
        }

        .ok-btn {
            width: 80%; max-width: 300px; padding: 12px; font-size: 1.2rem;
            border-radius: 30px; border: none; background: #2ecc71; color: white;
            font-weight: bold; box-shadow: 0 5px 0 #27ae60; cursor: pointer;
        }
        .ok-btn:disabled { background: #bdc3c7; box-shadow: 0 5px 0 #95a5a6; opacity: 0.6; }

        .info-panel { text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="portrait-lock"><div>🔄 請旋轉至直屏以進行遊戲</div></div>

<div class="top-bar">
    <div class="reset-wrapper">
        <svg><circle class="bg-circle" cx="25" cy="25" r="20"/><circle id="progressCircle" class="progress-circle" cx="25" cy="25" r="20"/></svg>
        <button id="resetBtn" class="reset-trigger">重置</button>
    </div>
    <div class="info-panel">
        <div id="status" style="font-weight: bold;">黑棋回合</div>
        <div id="score" style="color: #e74c3c; font-size: 0.9rem;">黑 0 : 0 白</div>
    </div>
    <button class="exit-btn" onclick="exitGame()">EXIT</button>
</div>

<div class="main-layout">
    <canvas id="gameBoard" width="550" height="550"></canvas>
    <button id="okBtn" class="ok-btn" disabled onclick="executeMove()">確認移動 (OK)</button>
</div>

<script>
    // --- 核心邏輯與 Abalone 引擎 (延續 v1.7.0) ---
    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const HEX_SIZE = 32;
    const OFFSET = { x: 275, y: 275 };
    let board = {}; let tempBoard = null; let turn = 1; 
    let selectedTail = null; let legalTargets = []; let previewTarget = null; let score = { 1: 0, 2: 0 };
    const DIRS = [{q:1,r:-1},{q:1,r:0},{q:0,r:1},{q:-1,r:1},{q:-1,r:0},{q:0,r:-1}];

    function exitGame() { if(confirm("確定返回大廳？")) window.location.href = "../../index.html"; }

    // --- 重置按鈕長按邏輯 (SVG 進度條) ---
    const resetBtn = document.getElementById('resetBtn');
    const progressCircle = document.getElementById('progressCircle');
    const CIRCUMFERENCE = 126; // 2 * PI * 20
    let longPressTimer;
    let startTime;
    const DURATION = 2000; // 改為 2 秒，5 秒對使用者來說太久了

    function startPress(e) {
        e.preventDefault();
        startTime = Date.now();
        longPressTimer = requestAnimationFrame(updateProgress);
    }

    function updateProgress() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / DURATION, 1);
        progressCircle.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);

        if (progress < 1) {
            longPressTimer = requestAnimationFrame(updateProgress);
        } else {
            if(confirm("重置遊戲？")) location.reload();
            cancelPress();
        }
    }

    function cancelPress() {
        cancelAnimationFrame(longPressTimer);
        progressCircle.style.strokeDashoffset = CIRCUMFERENCE;
    }

    resetBtn.addEventListener('mousedown', startPress);
    resetBtn.addEventListener('touchstart', startPress);
    window.addEventListener('mouseup', cancelPress);
    window.addEventListener('touchend', cancelPress);

    // --- 遊戲初始化與繪圖 (縮減版，邏輯同 v1.7.0) ---
    function init() {
        for (let q = -4; q <= 4; q++) {
            for (let r = -4; r <= 4; r++) {
                if (Math.abs(q + r) <= 4) {
                    let val = 0;
                    if (r <= -3) val = 2; else if (r == -2 && [0,1,2].includes(q)) val = 2;
                    else if (r >= 3) val = 1; else if (r == 2 && [0,-1,-2].includes(q)) val = 1;
                    board[`${q},${r}`] = val;
                }
            }
        }
    }

    // (此處包含 v1.7.0 的繪圖與移動邏輯函數: hexToPixel, draw, calculateLegalMoves 等...)
    // 為節省篇幅，邏輯與 1.7.0 保持一致，僅更新 UI 綁定。
    
    // 記得將 v1.7.0 的遊戲邏輯 JS 貼回此處...
    
    init(); 
    // 預設執行繪圖
    function draw() {
        ctx.clearRect(0, 0, 550, 550);
        for (let key in board) {
            let [q, r] = key.split(',').map(Number);
            let {x, y} = { x: HEX_SIZE * Math.sqrt(3) * (q + r/2) + OFFSET.x, y: HEX_SIZE * (3/2) * r + OFFSET.y };
            ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.85, 0, Math.PI*2);
            ctx.fillStyle = "#ddd"; ctx.fill();
            if (board[key] > 0) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.7, 0, Math.PI*2);
                ctx.fillStyle = board[key] === 1 ? "#333" : "#fff"; ctx.fill();
                ctx.strokeStyle = (selectedTail && selectedTail.q === q && selectedTail.r === r) ? "#f1c40f" : "#000";
                ctx.lineWidth = (selectedTail && selectedTail.q === q && selectedTail.r === r) ? 4 : 1; ctx.stroke();
            }
        }
    }
    draw();
</script>
</body>
</html>
