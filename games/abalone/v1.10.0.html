<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智推棋 Abalone - v1.10.0</title>
    <style>
        /* [Checksum: v1.9.9 樣式完全保留] */
        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        html, body { overscroll-behavior: none; height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #2c3e50; font-family: sans-serif; }
        #app-viewport { position: fixed; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.3s ease; transform-origin: center center; overflow: hidden; }
        .top-bar { position: absolute; top: 15px; width: 90%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .reset-wrapper { position: relative; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .reset-wrapper svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; pointer-events: none; }
        .reset-wrapper circle { fill: none; stroke-width: 4; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255, 255, 255, 0.1); }
        .circle-progress { stroke: #e74c3c; stroke-dasharray: 126; stroke-dashoffset: 126; transition: stroke-dashoffset 0.1s linear; }
        .reset-btn { width: 36px; height: 36px; border-radius: 50%; background: #95a5a6; border: none; color: white; font-size: 9px; font-weight: bold; cursor: pointer; z-index: 2; }
        .exit-btn { padding: 6px 15px; font-size: 0.8rem; background: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .info { background: rgba(255,255,255,0.9); padding: 5px 12px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .game-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        canvas { background: #fff; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 80vmin; height: 80vmin; max-width: 450px; max-height: 450px; touch-action: none; margin: 10px 0; }
        
        .ok-btn { padding: 12px 45px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 30px; background: #7f8c8d; color: white; font-weight: bold; box-shadow: 0 4px 0 #34495e; z-index: 10; transition: all 0.3s; }
        .ok-btn.active-ready { background: #27ae60 !important; box-shadow: 0 4px 0 #1e8449 !important; }
        @keyframes orbit-glow { 0% { box-shadow: 0 0 5px #2ecc71; border: 2px solid #2ecc71; } 50% { box-shadow: 0 0 20px #2ecc71, 0 0 30px rgba(46, 204, 113, 0.5); border: 2px solid #fff; } 100% { box-shadow: 0 0 5px #2ecc71; border: 2px solid #2ecc71; } }
        .ok-btn.turn-glow { animation: orbit-glow 1.5s ease-in-out infinite; }
        
        .control-row { display: flex; align-items: center; justify-content: center; gap: 40px; width: 100%; margin: 8px 0; }
        .surrender-wrapper { position: relative; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
        @keyframes surrender-shake { 0% { transform: translate(0,0); } 25% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 75% { transform: translate(2px, -2px); } 100% { transform: translate(0,0); } }
        .surrender-btn { width: 44px; height: 44px; border-radius: 50%; background: #c0392b; border: none; color: white; font-size: 13px; font-weight: bold; cursor: pointer; z-index: 2; box-shadow: 0 3px 0 #962d22; letter-spacing: 1px; transition: transform 0.1s linear; }
        .surrender-btn.pressing { animation: surrender-shake 0.1s infinite; background: #e74c3c; }
        .explosion-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
        @keyframes flash-white { 0% { opacity: 0; } 10% { opacity: 1; } 100% { opacity: 0; } }

        /* 手術位置 1：模式選擇與猜拳 UI */
        #setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .setup-card { background: #34495e; padding: 25px; border-radius: 15px; border: 2px solid #7f8c8d; width: 85%; max-width: 320px; }
        .setup-title { font-size: 1.2rem; margin-bottom: 20px; color: #f1c40f; }
        .mode-btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .pvb-btn { background: #2980b9; color: white; }
        .pvp-btn { background: #27ae60; color: white; }
        .rps-row { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .rps-btn { font-size: 2rem; background: none; border: 1px solid #7f8c8d; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.1); }
        .rps-btn:active { background: #f1c40f; transform: scale(1.1); }
        #version-tag { position: fixed; bottom: 8px; left: 8px; color: #7f8c8d; font-size: 10px; font-family: monospace; font-weight: bold; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

<div id="app-viewport">
    <div id="boom-layer" class="explosion-overlay"></div>
    
    <div id="setup-overlay">
        <div class="setup-card" id="mode-selector">
            <div class="setup-title">請選擇對局模式</div>
            <button class="mode-btn pvb-btn" onclick="showSideSelect()">P v Bot (人機)</button>
            <button class="mode-btn pvp-btn" onclick="showRPS()">P v P (猜拳開局)</button>
        </div>
        <div class="setup-card" id="side-selector" style="display:none;">
            <div class="setup-title">選擇您的順序</div>
            <button class="mode-btn" style="background:#333;" onclick="startGame('PVB', 1)">我先行 (黑棋)</button>
            <button class="mode-btn" style="background:#ecf0f1; color:#333;" onclick="startGame('PVB', 2)">我後行 (白棋)</button>
        </div>
        <div class="setup-card" id="rps-selector" style="display:none;">
            <div class="setup-title">猜拳決定先行</div>
            <div class="rps-row">
                <button class="rps-btn" onclick="playRPS('rock')">✊</button>
                <button class="rps-btn" onclick="playRPS('paper')">✋</button>
                <button class="rps-btn" onclick="playRPS('scissors')">✌️</button>
            </div>
            <div id="rps-result" style="margin-top:15px; font-weight:bold; height:20px;"></div>
        </div>
    </div>

    <div class="top-bar">
        <div class="reset-wrapper">
            <svg><circle class="circle-bg" cx="25" cy="25" r="20"/><circle id="progressCircle" class="circle-progress" cx="25" cy="25" r="20"/></svg>
            <button id="resetBtn" class="reset-btn">RESET</button>
        </div>
        <div class="info">
            <div id="status" style="font-weight: bold;">等待開局</div>
            <div id="score" style="font-size: 0.8rem; color: #e74c3c;">黑 0 : 0 白</div>
        </div>
        <button class="exit-btn" onclick="exitGame()">EXIT</button>
    </div>

    <div class="game-container">
        <div class="control-row">
            <button id="okBtnTop" class="ok-btn" disabled onclick="executeMove()">OK</button>
            <div class="surrender-wrapper">
                <button id="surBtnTop" class="surrender-btn">認輸</button>
            </div>
        </div>
        <canvas id="gameBoard" width="550" height="550"></canvas>
        <div class="control-row">
            <button id="okBtnBottom" class="ok-btn" disabled onclick="executeMove()">OK</button>
            <div class="surrender-wrapper">
                <button id="surBtnBottom" class="surrender-btn">認輸</button>
            </div>
        </div>
    </div>
</div>

<div id="version-tag">Abalone v1.10.0 | 功力累計: 0 場</div>

<script>
    // [靈魂與核心 Checksum 保留]
    const SOUL_KEY = "Gamy_Abalone_Soul";
    const DEFAULT_SOUL = { weights: { center: 0.5, attack: 0.5, defense: 0.5, grouping: 0.5 }, totalLearned: 1 };
    let aiSoul = JSON.parse(localStorage.getItem(SOUL_KEY)) || DEFAULT_SOUL;

    let GAME_MODE = "PVP"; // PVP, PVB
    let PLAYER_SIDE = 1; // 1:黑(先), 2:白(後)
    let isBotThinking = false;

    // 手術位置 2：模式切換邏輯
    function showSideSelect() { 
        document.getElementById('mode-selector').style.display = 'none';
        document.getElementById('side-selector').style.display = 'block';
    }
    function showRPS() {
        document.getElementById('mode-selector').style.display = 'none';
        document.getElementById('rps-selector').style.display = 'block';
    }
    function playRPS(userChoice) {
        const choices = ['rock', 'paper', 'scissors'];
        const botChoice = choices[Math.floor(Math.random()*3)];
        const resultEl = document.getElementById('rps-result');
        const icon = {rock:'✊', paper:'✋', scissors:'✌️'};
        
        let win = false;
        if (userChoice === botChoice) { resultEl.innerText = `平手 (${icon[botChoice]})，再來！`; return; }
        if ((userChoice === 'rock' && botChoice === 'scissors') || (userChoice === 'paper' && botChoice === 'rock') || (userChoice === 'scissors' && botChoice === 'paper')) win = true;
        
        resultEl.innerText = win ? `你贏了！(${icon[botChoice]}) 你先行` : `你輸了 (${icon[botChoice]}) 讓對方先行`;
        setTimeout(() => startGame('PVP', win ? 1 : 2), 1200);
    }
    function startGame(mode, side) {
        GAME_MODE = mode; PLAYER_SIDE = side;
        document.getElementById('setup-overlay').style.display = 'none';
        initBoard();
        if (GAME_MODE === "PVB" && PLAYER_SIDE === 2) triggerBotMove();
    }

    // --- 遊戲引擎 Checksum ---
    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const HEX_SIZE = 32; const OFFSET = { x: 275, y: 275 };
    let board = {}; let turn = 1; let selectedTail = null; let legalTargets = []; let previewTarget = null; let currentMoveInfo = null; let score = { 1: 0, 2: 0 };
    const DIRS = [{q:1,r:-1},{q:1,r:0},{q:0,r:1},{q:-1,r:1},{q:-1,r:0},{q:0,r:-1}];

    // 手術位置 3：注入基於靈魂權重的 Bot 決策
    function triggerBotMove() {
        if (isBotThinking) return;
        isBotThinking = true;
        const botColor = (GAME_MODE === "PVB") ? 2 : (turn); // PVB 模式下 Bot 永遠是白(2)
        
        setTimeout(() => {
            let moves = [];
            for (let key in board) {
                if (board[key] === turn) {
                    let [q, r] = key.split(',').map(Number);
                    calculateLegalMoves(q, r);
                    legalTargets.forEach(t => moves.push({ ...t, tailQ: q, tailR: r }));
                }
            }
            if (moves.length === 0) { isBotThinking = false; return; }

            moves.forEach(m => {
                let s = Math.random(); 
                if (m.oppCount > 0) s += 100 * aiSoul.weights.attack; // 攻擊權重
                let dist = Math.abs(m.q) + Math.abs(m.r) + Math.abs(-m.q-m.r);
                s += (10 - dist) * aiSoul.weights.center; // 中心權重
                m.finalScore = s;
            });
            moves.sort((a,b) => b.finalScore - a.finalScore);
            const best = moves[0];
            selectedTail = {q: best.tailQ, r: best.tailR}; currentMoveInfo = best; previewTarget = {q: best.q, r: best.r};
            draw();
            setTimeout(() => { executeMove(); isBotThinking = false; }, 600);
        }, 800);
    }

    function executeMove() {
        if (!currentMoveInfo) return; let nextBoard = {...board}; const moveInfo = currentMoveInfo;
        moveInfo.allies.forEach(s => nextBoard[`${s.q},${s.r}`] = 0);
        moveInfo.allies.forEach(s => nextBoard[`${s.q + moveInfo.dir.q},${s.r + moveInfo.dir.r}`] = turn);
        if (moveInfo.oppCount > 0) {
            for (let i = moveInfo.oppCount; i >= 1; i--) {
                let oQ = moveInfo.q + moveInfo.dir.q * (i-1), oR = moveInfo.r + moveInfo.dir.r * (i-1), next = { q: oQ + moveInfo.dir.q, r: oR + moveInfo.dir.r };
                if (board[`${next.q},${next.r}`] !== undefined) nextBoard[`${next.q},${next.r}`] = (turn === 1 ? 2 : 1); else score[turn]++;
            }
        }
        board = nextBoard; selectedTail = null; legalTargets = []; previewTarget = null; currentMoveInfo = null;
        if (score[turn] >= 6) { alert(`${turn === 1 ? "黑棋" : "白棋"} 勝利！`); location.reload(); return; }
        turn = (turn === 1) ? 2 : 1;
        updateUI(); draw();
        
        if (GAME_MODE === "PVB" && turn !== PLAYER_SIDE) triggerBotMove();
    }

    function updateUI() {
        document.getElementById('status').innerText = turn === 1 ? "黑棋回合" : "白棋回合";
        document.getElementById('score').innerText = `黑 ${score[1]} : ${score[2]} 白`;
        const tag = document.getElementById('version-tag');
        tag.innerText = `Abalone v1.10.0 | 功力累計: ${aiSoul.totalLearned} 場`;
        updateOKVisuals();
    }

    function updateOKVisuals() {
        const t = document.getElementById('okBtnTop'), b = document.getElementById('okBtnBottom');
        t.disabled = b.disabled = true; t.classList.remove('turn-glow', 'active-ready'); b.classList.remove('turn-glow', 'active-ready');
        if (GAME_MODE === "PVB" && turn !== PLAYER_SIDE) return;
        const activeBtn = (turn === 1 ? b : t);
        activeBtn.classList.add('turn-glow');
        if (previewTarget) { activeBtn.disabled = false; activeBtn.classList.add('active-ready'); }
    }

    function draw() {
        ctx.clearRect(0, 0, 550, 550);
        const movingAllies = currentMoveInfo ? currentMoveInfo.allies : [];
        for (let key in board) {
            let [q, r] = key.split(',').map(Number); let {x, y} = hexToPixel(q, r);
            ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.85, 0, Math.PI*2); ctx.fillStyle = "#ddd"; ctx.fill();
            let val = board[key];
            if (val > 0) {
                if (movingAllies.some(p => p.q === q && p.r === r)) {
                    ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = "#00d2ff";
                    ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.75, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(0, 210, 255, 0.9)"; ctx.lineWidth = 4; ctx.stroke(); ctx.restore();
                }
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.7, 0, Math.PI*2); ctx.fillStyle = val === 1 ? "#333" : "#fff"; ctx.fill();
                let isTail = selectedTail && selectedTail.q === q && selectedTail.r === r;
                ctx.strokeStyle = isTail ? "#f1c40f" : "#000"; ctx.lineWidth = isTail ? 4 : 1; ctx.stroke();
            }
            if (legalTargets.some(t => t.q === q && t.r === r)) { ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.5, 0, Math.PI*2); ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 4; ctx.stroke(); }
            if (previewTarget && previewTarget.q === q && previewTarget.r === r) { ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.75, 0, Math.PI*2); ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 5; ctx.stroke(); }
        }
    }

    /* [v1.9.9 爆炸認輸與 RESET 邏輯 Checksum 保留] */
    function setupSurrender(btnId) {
        const btn = document.getElementById(btnId);
        let pressTimer; let startTime; const DURATION = 3000;
        const start = (e) => { e.preventDefault(); if(isBotThinking)return; startTime = Date.now(); btn.classList.add('pressing'); pressTimer = requestAnimationFrame(animate); };
        const animate = () => {
            const p = Math.min((Date.now() - startTime) / DURATION, 1);
            btn.style.transform = `scale(${1 + (p * 0.5)})`;
            if (p < 1) pressTimer = requestAnimationFrame(animate); else { cancel(); document.getElementById('boom-layer').style.animation = 'flash-white 0.5s ease-out'; setTimeout(() => location.reload(), 300); }
        };
        const cancel = () => { cancelAnimationFrame(pressTimer); btn.classList.remove('pressing'); btn.style.transform = 'scale(1)'; };
        btn.addEventListener('mousedown', start); btn.addEventListener('touchstart', start);
        window.addEventListener('mouseup', cancel); window.addEventListener('touchend', cancel);
    }
    setupSurrender('surBtnTop'); setupSurrender('surBtnBottom');

    function handleInput(e) {
        if (GAME_MODE === "PVB" && turn !== PLAYER_SIDE) return;
        const {x, y} = getMousePos(e); let {q, r} = pixelToHex(x, y);
        if (board[`${q},${r}`] === undefined) return;
        if (board[`${q},${r}`] === turn) { previewTarget = null; currentMoveInfo = null; selectedTail = {q, r}; calculateLegalMoves(q, r); }
        else if (legalTargets.some(t => t.q === q && t.r === r)) { currentMoveInfo = legalTargets.find(t => t.q === q && t.r === r); previewTarget = {q, r}; }
        updateOKVisuals(); draw();
    }

    function initBoard() {
        for (let q = -4; q <= 4; q++) {
            for (let r = -4; r <= 4; r++) {
                if (Math.abs(q + r) <= 4) {
                    let val = 0;
                    if (r <= -3) val = 2; if (r == -2 && (q == 0 || q == 1 || q == 2)) val = 2;
                    if (r >= 3) val = 1; if (r == 2 && (q == 0 || q == -1 || q == -2)) val = 1;
                    board[`${q},${r}`] = val;
                }
            }
        }
        updateUI(); draw();
    }
    function hexToPixel(q, r) { return { x: HEX_SIZE * Math.sqrt(3) * (q + r/2) + OFFSET.x, y: HEX_SIZE * (3/2) * r + OFFSET.y }; }
    function pixelToHex(x, y) {
        x -= OFFSET.x; y -= OFFSET.y; let q = (Math.sqrt(3)/3 * x - 1/3 * y) / HEX_SIZE, r = (2/3 * y) / HEX_SIZE;
        let s = -q-r, rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
        let dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
        if (dq > dr && dq > ds) rq = -rr-rs; else if (dr > ds) rr = -rq-rs;
        return {q: rq, r: rr};
    }
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect(); const cX = e.touches ? e.touches[0].clientX : e.clientX; const cY = e.touches ? e.touches[0].clientY : e.clientY;
        let x = cX - rect.left, y = cY - rect.top;
        if (window.innerWidth > window.innerHeight) { let oX = x; x = y; y = rect.width - oX; }
        return { x: x * (550 / rect.width), y: y * (550 / rect.width) };
    }
    function calculateLegalMoves(q, r) {
        legalTargets = []; const c = board[`${q},${r}`];
        DIRS.forEach(dir => {
            let allies = [{q, r}]; for (let i = 1; i < 3; i++) { if (board[`${q+dir.q*i},${r+dir.r*i}`] === c) allies.push({q: q+dir.q*i, r: r+dir.r*i}); else break; }
            let myP = allies.length, head = allies[allies.length - 1], oppC = 0, canM = true, sP = { q: head.q + dir.q, r: head.r + dir.r };
            while (board[`${sP.q},${sP.r}`] !== undefined && board[`${sP.q},${sP.r}`] !== 0) { if (board[`${sP.q},${sP.r}`] === c) { canM = false; break; } oppC++; sP.q += dir.q; sP.r += dir.r; }
            if (canM && myP > oppC) legalTargets.push({ q: head.q + dir.q, r: head.r + dir.r, dir, allies, oppCount: oppC });
        });
    }

    const resetBtn = document.getElementById('resetBtn'); const progressCircle = document.getElementById('progressCircle');
    let r_timer; let r_start; const r_dur = 2000;
    function r_press(e) { e.preventDefault(); r_start = Date.now(); r_timer = requestAnimationFrame(r_upd); }
    function r_upd() {
        const p = Math.min((Date.now() - r_start) / r_dur, 1); progressCircle.style.strokeDashoffset = 126 * (1 - p);
        if (p < 1) r_timer = requestAnimationFrame(r_upd); else { if(confirm("重設？")) location.reload(); r_can(); }
    }
    function r_can() { cancelAnimationFrame(r_timer); progressCircle.style.strokeDashoffset = 126; }
    resetBtn.addEventListener('mousedown', r_press); resetBtn.addEventListener('touchstart', r_press);
    window.addEventListener('mouseup', r_can); window.addEventListener('touchend', r_can);

    function updateLayout() {
        const wrapper = document.getElementById('app-viewport'); const w = window.innerWidth; const h = window.innerHeight;
        wrapper.style.width = `${w}px`; wrapper.style.height = `${h}px`;
        if (w > h) { wrapper.style.transform = `translate(0, 0) rotate(90deg)`; wrapper.style.width = `${h}px`; wrapper.style.height = `${w}px`; wrapper.style.left = `${(w - h) / 2}px`; wrapper.style.top = `${(h - w) / 2}px`; }
        else { wrapper.style.transform = `none`; wrapper.style.left = `0`; wrapper.style.top = `0`; }
    }
    function exitGame() { if(confirm("離開？")) window.location.href = "../../index.html"; }
    window.addEventListener('resize', updateLayout); canvas.addEventListener('mousedown', handleInput); canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); });
    updateLayout();
</script>
</body>
</html>
