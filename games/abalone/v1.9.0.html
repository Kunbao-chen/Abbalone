<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智推棋 Abalone - v1.9.0</title>
    <style>
        /* [Checksum: 佈局完全保留] */
        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        html, body { overscroll-behavior: none; height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #2c3e50; font-family: sans-serif; }
        #app-viewport { position: fixed; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.3s ease; transform-origin: center center; overflow: hidden; }
        .top-bar { position: absolute; top: 15px; width: 90%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .reset-wrapper { position: relative; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .reset-wrapper svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; pointer-events: none; }
        .reset-wrapper circle { fill: none; stroke-width: 4; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255, 255, 255, 0.1); }
        .circle-progress { stroke: #e74c3c; stroke-dasharray: 126; stroke-dashoffset: 126; transition: stroke-dashoffset 0.1s linear; }
        .reset-btn { width: 36px; height: 36px; border-radius: 50%; background: #95a5a6; border: none; color: white; font-size: 9px; font-weight: bold; cursor: pointer; z-index: 2; }
        .exit-btn { padding: 6px 15px; font-size: 0.8rem; background: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .info { background: rgba(255,255,255,0.9); padding: 5px 12px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .game-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        canvas { background: #fff; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 85vmin; height: 85vmin; max-width: 450px; max-height: 450px; touch-action: none; margin: 10px 0; }
        .ok-btn { padding: 10px 40px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 30px; background: #2ecc71; color: white; font-weight: bold; box-shadow: 0 4px 0 #27ae60; z-index: 10; }
        .ok-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #27ae60; }
        .ok-btn:disabled { background: #bdc3c7; box-shadow: 0 4px 0 #95a5a6; opacity: 0.5; }

        /* 手術位置 2：植入鐵灰色修行控制項 */
        #soul-controls { position: absolute; top: 75px; width: 90%; max-width: 450px; display: flex; justify-content: center; gap: 8px; z-index: 20; }
        .soul-btn { background: rgba(85, 85, 85, 0.15); color: #555555; border: 1px solid #555555; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .soul-btn:hover { background: rgba(85, 85, 85, 0.6); color: white; }
        #version-tag { position: fixed; bottom: 8px; left: 8px; color: #555555; font-size: 10px; font-family: monospace; font-weight: bold; pointer-events: none; z-index: 999; }
        #thinking-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); color: #bdc3c7; padding: 20px 40px; border-radius: 10px; display: none; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

<div id="app-viewport">
    <div class="top-bar">
        <div class="reset-wrapper">
            <svg><circle class="circle-bg" cx="25" cy="25" r="20"/><circle id="progressCircle" class="circle-progress" cx="25" cy="25" r="20"/></svg>
            <button id="resetBtn" class="reset-btn">RESET</button>
        </div>
        <div class="info">
            <div id="status" style="font-weight: bold;">黑棋回合</div>
            <div id="score" style="font-size: 0.8rem; color: #e74c3c;">黑 0 : 0 白</div>
        </div>
        <button class="exit-btn" onclick="exitGame()">EXIT</button>
    </div>

    <div id="soul-controls">
        <a href="robot_soul_seed.json" download class="soul-btn">取得初始手札</a>
        <button class="soul-btn" onclick="triggerImport()">傳承匯入 (增量融合)</button>
        <button class="soul-btn" onclick="exportSoul()">修行匯出</button>
    </div>

    <div class="game-container">
        <button id="okBtnTop" class="ok-btn" disabled onclick="executeMove()">OK</button>
        <canvas id="gameBoard" width="550" height="550"></canvas>
        <button id="okBtnBottom" class="ok-btn" disabled onclick="executeMove()">OK</button>
    </div>
</div>

<div id="version-tag">Abalone v1.9.0 | 功力累計: 0 場</div>
<div id="thinking-overlay">徒弟思考中...</div>
<input type="file" id="soul-file-input" style="display:none;" onchange="handleFileImport(event)">

<script>
    // 手術位置 4：植入修行核心數據與融合算法 (高智商版)
    const SOUL_KEY = "Gamy_Abalone_Soul";
    let aiSoul = JSON.parse(localStorage.getItem(SOUL_KEY)) || {
        weights: { center: 0.5, attack: 0.5, defense: 0.5, grouping: 0.5 },
        totalLearned: 0
    };

    function updateSoulUI() {
        const tag = document.getElementById('version-tag');
        if(tag) tag.innerText = `Abalone v1.9.0 | 功力累計: ${aiSoul.totalLearned} 場`;
    }

    function smartMerge(importedSoul) {
        const currentTotal = aiSoul.totalLearned;
        const importedTotal = importedSoul.totalLearned;
        const delta = importedTotal - currentTotal;

        if (delta <= 0) {
            alert("偵測到重複或較舊的手札，已取消融合以防止記憶偏差。");
            return;
        }

        // 高智商融合：僅針對差額(Delta)場數進行加權
        for (let key in aiSoul.weights) {
            aiSoul.weights[key] = (
                (aiSoul.weights[key] * currentTotal) + 
                (importedSoul.weights[key] * delta)
            ) / importedTotal;
        }

        aiSoul.totalLearned = importedTotal;
        localStorage.setItem(SOUL_KEY, JSON.stringify(aiSoul));
        updateSoulUI();
        alert(`融合成功！吸納了 ${delta} 場新功力，總修為：${importedTotal} 場。`);
    }

    function triggerImport() { document.getElementById('soul-file-input').click(); }
    function handleFileImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                smartMerge(imported);
            } catch(err) { alert("手札格式錯誤。"); }
        };
        reader.readAsText(file);
    }

    function exportSoul() {
        const date = new Date().toISOString().slice(0,10).replace(/-/g,"");
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(aiSoul));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `abalone_soul_${aiSoul.totalLearned}G_${date}.json`);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    // 1.1秒思考感實現
    async function robotThinkDelay() {
        const overlay = document.getElementById('thinking-overlay');
        overlay.style.display = 'block';
        const start = Date.now();
        // 此處模擬 Robot 邏輯計算...
        const elapsed = Date.now() - start;
        if (elapsed < 1100) await new Promise(r => setTimeout(r, 1100 - elapsed));
        overlay.style.display = 'none';
    }

    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const HEX_SIZE = 32;
    const OFFSET = { x: 275, y: 275 };
    let board = {}; let turn = 1; 
    let selectedTail = null; let legalTargets = [];   
    let previewTarget = null; let currentMoveInfo = null; // 存儲待執行的移動資訊
    let score = { 1: 0, 2: 0 };
    const DIRS = [{q:1,r:-1},{q:1,r:0},{q:0,r:1},{q:-1,r:1},{q:-1,r:0},{q:0,r:-1}];
    let lastTurnTime = 0;
    const GLOW_DURATION = 800;

    function exitGame() { if(confirm("確定要離開遊戲？")) window.location.href = "../../index.html"; }

    function init() {
        updateSoulUI(); // 手術位置：初始化 UI
        // [Checksum 啟動]
        if (aiSoul.totalLearned === 0) {
            setTimeout(() => {
                if(confirm("偵測到道場空無一人。您是否有之前的『徒弟手札』檔案可以匯入融合？")) triggerImport();
            }, 800);
        }

        for (let q = -4; q <= 4; q++) {
            for (let r = -4; r <= 4; r++) {
                if (Math.abs(q + r) <= 4) {
                    let val = 0;
                    if (r <= -3) val = 2;
                    if (r == -2 && (q == 0 || q == 1 || q == 2)) val = 2;
                    if (r >= 3) val = 1;
                    if (r == 2 && (q == 0 || q == -1 || q == -2)) val = 1;
                    board[`${q},${r}`] = val;
                }
            }
        }
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let x = clientX - rect.left; let y = clientY - rect.top;
        if (window.innerWidth > window.innerHeight) {
            let oldX = x; x = y; y = rect.width - oldX;
        }
        const scale = 550 / rect.width;
        return { x: x * scale, y: y * scale };
    }

    function hexToPixel(q, r) { return { x: HEX_SIZE * Math.sqrt(3) * (q + r/2) + OFFSET.x, y: HEX_SIZE * (3/2) * r + OFFSET.y }; }
    function pixelToHex(x, y) {
        x -= OFFSET.x; y -= OFFSET.y;
        let q = (Math.sqrt(3)/3 * x - 1/3 * y) / HEX_SIZE, r = (2/3 * y) / HEX_SIZE;
        return hexRound(q, r);
    }
    function hexRound(q, r) {
        let s = -q-r, rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
        let dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
        if (dq > dr && dq > ds) rq = -rr-rs; else if (dr > ds) rr = -rq-rs;
        return {q: rq, r: rr};
    }

    // [繪圖邏輯] 嚴格確保棋子留在原地，直到 OK
    function draw() {
        const now = Date.now();
        const elapsed = now - lastTurnTime;
        const isGlowing = elapsed < GLOW_DURATION;
        ctx.clearRect(0, 0, 550, 550);
        for (let key in board) {
            let [q, r] = key.split(',').map(Number);
            let {x, y} = hexToPixel(q, r);
            
            ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.85, 0, Math.PI*2);
            ctx.fillStyle = "#ddd"; ctx.fill();
            
            let val = board[key];
            if (val > 0) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.7, 0, Math.PI*2);
                if (isGlowing && val === turn) {
                    const p = elapsed / GLOW_DURATION;
                    let grad = ctx.createRadialGradient(x, y, 0, x, y, HEX_SIZE * 0.7);
                    grad.addColorStop(0, `hsla(${p * 360}, 80%, 60%, 1)`);
                    grad.addColorStop(1, val === 1 ? "#333" : "#fff");
                    ctx.fillStyle = grad;
                } else {
                    ctx.fillStyle = val === 1 ? "#333" : "#fff";
                }
                ctx.fill();
                let isTail = selectedTail && selectedTail.q === q && selectedTail.r === r;
                ctx.strokeStyle = isTail ? "#f1c40f" : "#000"; ctx.lineWidth = isTail ? 4 : 1; ctx.stroke();
            }

            if (legalTargets.some(t => t.q === q && t.r === r)) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.5, 0, Math.PI*2);
                ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 4; ctx.stroke();
            }
            if (previewTarget && previewTarget.q === q && previewTarget.r === r) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.75, 0, Math.PI*2);
                ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 5; ctx.stroke();
            }
        }
        if (isGlowing) requestAnimationFrame(draw);
    }

    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); });

    function handleInput(e) {
        const {x, y} = getMousePos(e);
        let {q, r} = pixelToHex(x, y);
        let key = `${q},${r}`;
        if (board[key] === undefined) return;
        
        if (board[key] === turn) {
            previewTarget = null;
            currentMoveInfo = null;
            selectedTail = {q, r};
            calculateLegalMoves(q, r);
        } 
        else if (legalTargets.some(t => t.q === q && t.r === r)) {
            currentMoveInfo = legalTargets.find(t => t.q === q && t.r === r);
            previewTarget = {q, r}; 
            // 點擊紅圈僅顯示綠圈，不更新 board 也不預演
        }
        updateUI();
    }

    function calculateLegalMoves(q, r) {
        legalTargets = [];
        DIRS.forEach(dir => {
            let allies = [{q, r}];
            for (let i = 1; i < 3; i++) {
                let cQ = q + dir.q * i, cR = r + dir.r * i;
                if (board[`${cQ},${cR}`] === turn) allies.push({q: cQ, r: cR}); else break;
            }
            let myPower = allies.length, head = allies[allies.length - 1], oppCount = 0, canMove = true;
            let scanPos = { q: head.q + dir.q, r: head.r + dir.r };
            while (board[`${scanPos.q},${scanPos.r}`] !== undefined && board[`${scanPos.q},${scanPos.r}`] !== 0) {
                if (board[`${scanPos.q},${scanPos.r}`] === turn) { canMove = false; break; }
                oppCount++; scanPos.q += dir.q; scanPos.r += dir.r;
            }
            if (canMove && myPower > oppCount) legalTargets.push({ q: head.q + dir.q, r: head.r + dir.r, dir, allies, oppCount });
        });
    }

    async function executeMove() {
        if (!currentMoveInfo) return;
        
        // 手術位置：若為 Robot 回合，觸發思考延遲
        // 這裡預留給 Robot 模式，目前 PVP 僅執行
        
        let nextBoard = {...board};
        const moveInfo = currentMoveInfo;
        
        // 1. 移除舊位
        moveInfo.allies.forEach(s => nextBoard[`${s.q},${s.r}`] = 0);
        // 2. 放置新位
        moveInfo.allies.forEach(s => nextBoard[`${s.q + moveInfo.dir.q},${s.r + moveInfo.dir.r}`] = turn);
        // 3. 推動
        let oppColor = (turn === 1 ? 2 : 1);
        if (moveInfo.oppCount > 0) {
            for (let i = moveInfo.oppCount; i >= 1; i--) {
                let oQ = moveInfo.q + moveInfo.dir.q * (i-1), oR = moveInfo.r + moveInfo.dir.r * (i-1);
                let next = { q: oQ + moveInfo.dir.q, r: oR + moveInfo.dir.r };
                if (board[`${next.q},${next.r}`] !== undefined) nextBoard[`${next.q},${next.r}`] = oppColor;
                else score[turn]++; // 推出場外
            }
        }
        
        board = nextBoard; 
        selectedTail = null; legalTargets = []; previewTarget = null; currentMoveInfo = null;
        turn = (turn === 1) ? 2 : 1; 
        lastTurnTime = Date.now();
        updateUI();
    }

    function updateUI() {
        document.getElementById('status').innerText = turn === 1 ? "黑棋回合" : "白棋回合";
        document.getElementById('score').innerText = `黑 ${score[1]} : ${score[2]} 白`;
        const t = document.getElementById('okBtnTop'), b = document.getElementById('okBtnBottom');
        t.disabled = b.disabled = true;
        if (previewTarget) { if (turn === 1) b.disabled = false; else t.disabled = false; }
        draw();
    }

    const resetBtn = document.getElementById('resetBtn');
    const progressCircle = document.getElementById('progressCircle');
    let pressTimer; let startTime; const DURATION = 2000;
    function startPress(e) { e.preventDefault(); startTime = Date.now(); pressTimer = requestAnimationFrame(updateProgress); }
    function updateProgress() {
        const elapsed = Date.now() - startTime;
        const p = Math.min(elapsed / DURATION, 1);
        progressCircle.style.strokeDashoffset = 126 * (1 - p);
        if (p < 1) pressTimer = requestAnimationFrame(updateProgress);
        else { if(confirm("確定重置棋盤？")) location.reload(); cancelPress(); }
    }
    function cancelPress() { cancelAnimationFrame(pressTimer); progressCircle.style.strokeDashoffset = 126; }
    resetBtn.addEventListener('mousedown', startPress);
    resetBtn.addEventListener('touchstart', startPress);
    window.addEventListener('mouseup', cancelPress);
    window.addEventListener('touchend', cancelPress);

    function updateLayout() {
        const wrapper = document.getElementById('app-viewport');
        const w = window.innerWidth; const h = window.innerHeight;
        wrapper.style.width = `${w}px`; wrapper.style.height = `${h}px`;
        if (w > h) {
            wrapper.style.transform = `translate(0, 0) rotate(90deg)`;
            wrapper.style.width = `${h}px`; wrapper.style.height = `${w}px`;
            wrapper.style.left = `${(w - h) / 2}px`; wrapper.style.top = `${(h - w) / 2}px`;
        } else {
            wrapper.style.transform = `none`; wrapper.style.left = `0`; wrapper.style.top = `0`;
        }
    }
    window.addEventListener('resize', updateLayout);
    window.addEventListener('orientationchange', () => setTimeout(updateLayout, 100));
    
    init(); updateLayout(); draw();
</script>
</body>
</html>
