<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智推棋 Abalone - v1.7.0</title>
    <style>
        /* 基礎設定與防止縮放 */
        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        html, body { 
            overscroll-behavior: none; height: 100%; width: 100%; margin: 0; padding: 0;
            overflow: hidden; background: #ececec;
        }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* 非對稱角落佈局 (核心變動) */
        .version-tag { position: absolute; top: 8px; left: 10px; font-size: 0.65rem; color: #95a5a6; }
        .exit-btn {
            position: absolute; top: 8px; right: 10px; padding: 5px 15px;
            font-size: 0.8rem; background: #95a5a6; color: white; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold;
        }
        .info {
            position: absolute; top: 35px; left: 10px; background: rgba(255,255,255,0.85);
            padding: 8px 12px; border-radius: 8px; transform: scale(0.85); transform-origin: top left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10;
        }

        /* 棋盤極大化佈局 */
        .game-container { display: flex; flex-direction: column; align-items: center; width: 100vw; }
        canvas {
            background: #fff; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 92vmin; height: 92vmin; touch-action: none; cursor: pointer;
        }
        
        /* OK 按鈕樣式 (縮小並保持在中軸) */
        .ok-btn {
            padding: 8px 30px; font-size: 1rem; cursor: pointer; border: none;
            border-radius: 6px; background: #2ecc71; color: white; font-weight: bold;
            box-shadow: 0 3px 0 #27ae60; margin: 10px 0;
        }
        .ok-btn:disabled { background: #bdc3c7; box-shadow: 0 3px 0 #95a5a6; opacity: 0.5; cursor: not-allowed; }
        
        /* 重置按鈕 */
        .reset-btn { margin-top: 5px; font-size: 0.7rem; color: #95a5a6; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="version-tag">v1.7.0</div>
<button class="exit-btn" onclick="exitGame()">EXIT</button>

<div class="info">
    <div id="status" style="font-size: 1.2rem; font-weight: bold;">黑棋回合</div>
    <div id="score" style="font-size: 1rem; color: #e74c3c;">黑 0 : 0 白</div>
</div>

<div class="game-container">
    <button id="okBtnTop" class="ok-btn" disabled onclick="executeMove()">OK</button>
    <canvas id="gameBoard" width="550" height="550"></canvas>
    <button id="okBtnBottom" class="ok-btn" disabled onclick="executeMove()">OK</button>
    <button id="resetBtn" class="reset-btn">長按 5 秒重置</button>
</div>

<script>
    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const HEX_SIZE = 32;
    const OFFSET = { x: 275, y: 275 };

    let board = {}; let tempBoard = null; let turn = 1; 
    let selectedTail = null; let legalTargets = [];   
    let previewTarget = null; let score = { 1: 0, 2: 0 };

    const DIRS = [{q:1,r:-1},{q:1,r:0},{q:0,r:1},{q:-1,r:1},{q:-1,r:0},{q:0,r:-1}];

    // 退出遊戲回到大廳
    function exitGame() { 
        if(confirm("確定要離開遊戲並返回大廳嗎？")) {
            window.location.href = "../../index.html"; 
        }
    }

    function init() {
        for (let q = -4; q <= 4; q++) {
            for (let r = -4; r <= 4; r++) {
                if (Math.abs(q + r) <= 4) {
                    let val = 0;
                    if (r <= -3) val = 2;
                    if (r == -2 && (q == 0 || q == 1 || q == 2)) val = 2;
                    if (r >= 3) val = 1;
                    if (r == 2 && (q == 0 || q == -1 || q == -2)) val = 1;
                    board[`${q},${r}`] = val;
                }
            }
        }
    }

    function hexToPixel(q, r) { return { x: HEX_SIZE * Math.sqrt(3) * (q + r/2) + OFFSET.x, y: HEX_SIZE * (3/2) * r + OFFSET.y }; }
    function pixelToHex(x, y) {
        x -= OFFSET.x; y -= OFFSET.y;
        let q = (Math.sqrt(3)/3 * x - 1/3 * y) / HEX_SIZE, r = (2/3 * y) / HEX_SIZE;
        return hexRound(q, r);
    }
    function hexRound(q, r) {
        let s = -q-r, rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
        let dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
        if (dq > dr && dq > ds) rq = -rr-rs; else if (dr > ds) rr = -rq-rs;
        return {q: rq, r: rr};
    }

    function draw() {
        ctx.clearRect(0, 0, 550, 550);
        for (let key in board) {
            let [q, r] = key.split(',').map(Number);
            let {x, y} = hexToPixel(q, r);
            ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.85, 0, Math.PI*2);
            ctx.fillStyle = "#ddd"; ctx.fill();
            if (board[key] > 0) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.7, 0, Math.PI*2);
                ctx.fillStyle = board[key] === 1 ? "#333" : "#fff"; ctx.fill();
                let isTail = selectedTail && selectedTail.q === q && selectedTail.r === r;
                ctx.strokeStyle = isTail ? "#f1c40f" : "#000"; ctx.lineWidth = isTail ? 4 : 1; ctx.stroke();
            }
            if (legalTargets.some(t => t.q === q && t.r === r)) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.5, 0, Math.PI*2);
                ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 4; ctx.stroke();
            }
            if (previewTarget && previewTarget.q === q && previewTarget.r === r) {
                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.75, 0, Math.PI*2);
                ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 5; ctx.stroke();
            }
        }
    }

    canvas.onclick = (e) => {
        let rect = canvas.getBoundingClientRect();
        let scale = 550 / rect.width;
        let mouseX = (e.clientX - rect.left) * scale, mouseY = (e.clientY - rect.top) * scale;
        let {q, r} = pixelToHex(mouseX, mouseY);
        let key = `${q},${r}`;
        if (board[key] === undefined) return;
        if (board[key] === turn) {
            tempBoard = null; previewTarget = null; selectedTail = {q, r};
            calculateLegalMoves(q, r);
        } else if (legalTargets.some(t => t.q === q && t.r === r)) {
            let moveInfo = legalTargets.find(t => t.q === q && t.r === r);
            previewTarget = {q, r}; prepareMove(moveInfo);
        }
        updateButtons(); draw();
    };

    function calculateLegalMoves(q, r) {
        legalTargets = [];
        DIRS.forEach(dir => {
            let allies = [{q, r}];
            for (let i = 1; i < 3; i++) {
                let cQ = q + dir.q * i, cR = r + dir.r * i;
                if (board[`${cQ},${cR}`] === turn) allies.push({q: cQ, r: cR}); else break;
            }
            let myPower = allies.length, head = allies[allies.length - 1], oppCount = 0, canMove = true;
            let scanPos = { q: head.q + dir.q, r: head.r + dir.r };
            while (board[`${scanPos.q},${scanPos.r}`] !== undefined && board[`${scanPos.q},${scanPos.r}`] !== 0) {
                if (board[`${scanPos.q},${scanPos.r}`] === turn) { canMove = false; break; }
                oppCount++; scanPos.q += dir.q; scanPos.r += dir.r;
            }
            if (canMove && myPower > oppCount) legalTargets.push({ q: head.q + dir.q, r: head.r + dir.r, dir, allies, oppCount });
        });
    }

    function prepareMove(moveInfo) {
        tempBoard = {...board};
        moveInfo.allies.forEach(s => tempBoard[`${s.q},${s.r}`] = 0);
        moveInfo.allies.forEach(s => tempBoard[`${s.q + moveInfo.dir.q},${s.r + moveInfo.dir.r}`] = turn);
        let oppColor = (turn === 1 ? 2 : 1);
        if (moveInfo.oppCount > 0) {
            for (let i = moveInfo.oppCount; i >= 1; i--) {
                let oQ = moveInfo.q + moveInfo.dir.q * (i-1), oR = moveInfo.r + moveInfo.dir.r * (i-1);
                let next = { q: oQ + moveInfo.dir.q, r: oR + moveInfo.dir.r };
                if (board[`${next.q},${next.r}`] !== undefined) tempBoard[`${next.q},${next.r}`] = oppColor;
            }
        }
    }

    function executeMove() {
        let oppColor = (turn === 1 ? 2 : 1);
        let bCount = Object.values(board).filter(v => v === oppColor).length;
        let aCount = Object.values(tempBoard).filter(v => v === oppColor).length;
        score[turn] += (bCount - aCount);
        board = tempBoard; tempBoard = null; selectedTail = null; legalTargets = []; previewTarget = null;
        turn = (turn === 1) ? 2 : 1; updateUI();
    }

    function updateButtons() {
        const t = document.getElementById('okBtnTop'), b = document.getElementById('okBtnBottom');
        t.disabled = b.disabled = true;
        if (tempBoard) { if (turn === 1) b.disabled = false; else t.disabled = false; }
    }

    function updateUI() {
        document.getElementById('status').innerText = turn === 1 ? "黑棋回合" : "白棋回合";
        document.getElementById('score').innerText = `黑 ${score[1]} : ${score[2]} 白`;
        updateButtons(); draw();
    }

    let resetTimer;
    const resetBtn = document.getElementById('resetBtn');
    function startReset() { resetBtn.innerText = "請按住 5 秒..."; resetTimer = setTimeout(() => { if(confirm("確定要重置棋盤嗎？")) location.reload(); }, 5000); }
    function cancelReset() { clearTimeout(resetTimer); resetBtn.innerText = "長按 5 秒重置"; }
    resetBtn.addEventListener('mousedown', startReset); resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startReset(); });
    resetBtn.addEventListener('mouseup', cancelReset); resetBtn.addEventListener('touchend', cancelReset);

    init(); draw();
</script>
</body>
</html>
