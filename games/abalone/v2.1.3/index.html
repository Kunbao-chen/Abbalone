<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Abalone Pro (PVP)</title>
    <link rel="stylesheet" href="style.css">
    <script>window.HTML_VERSION = "v3.0.0";</script>
</head>
<body>
    <div id="game-app">
        <header class="status-panel">
            <button id="btn-reset" class="icon-btn">↻ 重置</button>
            <div class="score-board">
                <span id="score-black" class="score black-active">黑: 0</span>
                <span id="turn-indicator">黑棋回合</span>
                <span id="score-white" class="score">白: 0</span>
            </div>
            <button id="btn-surrender" class="icon-btn danger">認輸</button>
        </header>

        <main class="board-container" id="board-wrapper">
            <canvas id="game-canvas"></canvas>
        </main>

        <footer class="control-panel">
            <button id="btn-execute" class="action-btn" disabled>確認走棋</button>
        </footer>
    </div>

    <div id="global-version-tag">Loading versions...</div>

    <script src="engine.js"></script>
    <script src="ui.js"></script>
</body>
</html>
