<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Abalone Pro PVP - v3.5.0</title>
    <link rel="stylesheet" href="style.css">
    <script>window.HTML_VERSION = "v3.5.0";</script>
</head>
<body>
    <div id="game-app" class="orientation-adaptive">
        <header class="control-panel side-alpha">
            <div class="meta-actions">
                <button id="btn-exit" class="icon-btn">✕</button>
                <button id="btn-reset" class="icon-btn">↻</button>
            </div>
            <div class="action-zone">
                <div id="ctrl-alpha" class="turn-controls" style="display: none;">
                    <div class="path-nav">
                        <button id="btn-prev-alpha" class="nav-btn">◀</button>
                        <span id="ind-alpha" class="path-indicator">1/1</span>
                        <button id="btn-next-alpha" class="nav-btn">▶</button>
                    </div>
                    <button id="btn-ok-alpha" class="execute-btn">確認走棋</button>
                </div>
            </div>
            <div class="score-board blue-zone" id="score-alpha">白棋: 0</div>
        </header>

        <main class="board-container" id="board-wrapper">
            <canvas id="game-canvas"></canvas>
        </main>

        <footer class="control-panel side-beta">
            <div class="score-board blue-zone" id="score-beta">黑棋: 0</div>
            <div class="action-zone">
                <div id="ctrl-beta" class="turn-controls" style="display: none;">
                    <div class="path-nav">
                        <button id="btn-prev-beta" class="nav-btn">◀</button>
                        <span id="ind-beta" class="path-indicator">1/1</span>
                        <button id="btn-next-beta" class="nav-btn">▶</button>
                    </div>
                    <button id="btn-ok-beta" class="execute-btn">確認走棋</button>
                </div>
            </div>
            <div id="turn-status">黑棋回合</div>
        </footer>
    </div>
    <div id="global-version-tag">Loading...</div>
    <script src="engine.js"></script>
    <script src="ui.js"></script>
</body>
</html>
