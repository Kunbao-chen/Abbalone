<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智推棋 Abalone - v1.9.8</title>
    <style>
        /* [Checksum: 佈局與基礎樣式完全保留 v1.9.6] */
        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        html, body { overscroll-behavior: none; height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #2c3e50; font-family: sans-serif; }
        #app-viewport { position: fixed; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.3s ease; transform-origin: center center; overflow: hidden; }
        .top-bar { position: absolute; top: 15px; width: 90%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .reset-wrapper { position: relative; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .reset-wrapper svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; pointer-events: none; }
        .reset-wrapper circle { fill: none; stroke-width: 4; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255, 255, 255, 0.1); }
        .circle-progress { stroke: #e74c3c; stroke-dasharray: 126; stroke-dashoffset: 126; transition: stroke-dashoffset 0.1s linear; }
        .reset-btn { width: 36px; height: 36px; border-radius: 50%; background: #95a5a6; border: none; color: white; font-size: 9px; font-weight: bold; cursor: pointer; z-index: 2; }
        .exit-btn { padding: 6px 15px; font-size: 0.8rem; background: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .info { background: rgba(255,255,255,0.9); padding: 5px 12px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .game-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        canvas { background: #fff; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 80vmin; height: 80vmin; max-width: 450px; max-height: 450px; touch-action: none; margin: 10px 0; }
        
        .ok-btn { padding: 12px 45px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 30px; background: #7f8c8d; color: white; font-weight: bold; box-shadow: 0 4px 0 #34495e; z-index: 10; transition: all 0.3s; }
        .ok-btn.active-ready { background: #27ae60 !important; box-shadow: 0 4px 0 #1e8449 !important; }
        @keyframes orbit-glow {
            0% { box-shadow: 0 0 5px #2ecc71; border: 2px solid #2ecc71; }
            50% { box-shadow: 0 0 20px #2ecc71, 0 0 30px rgba(46, 204, 113, 0.5); border: 2px solid #fff; }
            100% { box-shadow: 0 0 5px #2ecc71; border: 2px solid #2ecc71; }
        }
        .ok-btn.turn-glow { animation: orbit-glow 1.5s ease-in-out infinite; }
        .ok-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e8449; }

        .control-row { display: flex; align-items: center; justify-content: center; gap: 40px; width: 100%; margin: 8px 0; }
        .surrender-wrapper { position: relative; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; }
        .surrender-wrapper svg { position: absolute; transform: rotate(-90deg); width: 100%; height: 100%; pointer-events: none; }
        .surrender-circle-bg { stroke: rgba(231, 76, 60, 0.1); fill: none; stroke-width: 4; }
        .surrender-progress { stroke: #e74c3c; fill: none; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 141; stroke-dashoffset: 141; transition: stroke-dashoffset 0.1s linear; }
        .surrender-btn { width: 40px; height: 40px; border-radius: 50%; background: #c0392b; border: none; color: white; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 2; box-shadow: 0 3px 0 #962d22; letter-spacing: 1px; }

        #soul-controls { position: absolute; top: 75px; width: 90%; max-width: 450px; display: flex; justify-content: center; gap: 8px; z-index: 20; }
        .soul-btn { background: rgba(255, 255, 255, 0.12); color: #bdc3c7; border: 1px solid #7f8c8d; padding: 4px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #version-tag { position: fixed; bottom: 8px; left: 8px; color: #7f8c8d; font-size: 10px; font-family: monospace; font-weight: bold; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

<div id="app-viewport">
    <div class="top-bar">
        <div class="reset-wrapper">
            <svg><circle class="circle-bg" cx="25" cy="25" r="20"/><circle id="progressCircle" class="circle-progress" cx="25" cy="25" r="20"/></svg>
            <button id="resetBtn" class="reset-btn">RESET</button>
        </div>
        <div class="info">
            <div id="status" style="font-weight: bold;">黑棋回合</div>
            <div id="score" style="font-size: 0.8rem; color: #e74c3c;">黑 0 : 0 白</div>
        </div>
        <button class="exit-btn" onclick="exitGame()">EXIT</button>
    </div>

    <div id="soul-controls">
        <button class="soul-btn" onclick="triggerSync()">傳承同步</button>
    </div>

    <div class="game-container">
        <div class="control-row">
            <button id="okBtnTop" class="ok-btn" disabled onclick="executeMove()">OK</button>
            <div class="surrender-wrapper">
                <svg><circle class="surrender-circle-bg" cx="27.5" cy="27.5" r="22.5"/><circle id="surProgressTop" class="surrender-progress" cx="27.5" cy="27.5" r="22.5" style="stroke-dasharray: 141; stroke-dashoffset: 141;"/></svg>
                <button id="surBtnTop" class="surrender-btn">認輸</button>
            </div>
        </div>

        <canvas id="gameBoard" width="550" height="550"></canvas>
        
        <div class="control-row">
            <button id="okBtnBottom" class="ok-btn" disabled onclick="executeMove()">OK</button>
            <div class="surrender-wrapper">
                <svg><circle class="surrender-circle-bg" cx="27.5" cy="27.5" r="22.5"/><circle id="surProgressBottom" class="surrender-progress" cx="27.5" cy="27.5" r="22.5" style="stroke-dasharray: 141; stroke-dashoffset: 141;"/></svg>
                <button id="surBtnBottom" class="surrender-btn">認輸</button>
            </div>
        </div>
    </div>
</div>

<div id="version-tag">Abalone v1.9.8 | 功力累計: 0 場</div>
<input type="file" id="soul-file-input" style="display:none;" onchange="handleFileSync(event)">

<script>
    const SOUL_KEY = "Gamy_Abalone_Soul";
    const DEFAULT_SOUL = { weights: { center: 0.5, attack: 0.5, defense: 0.5, grouping: 0.5 }, totalLearned: 1 };
    let aiSoul = JSON.parse(localStorage.getItem(SOUL_KEY)) || (function() { localStorage.setItem(SOUL_KEY, JSON.stringify(DEFAULT_SOUL)); return DEFAULT_SOUL; })();

    function updateSoulUI() {
        const tag = document.getElementById('version-tag');
        if(tag) tag.innerText = `Abalone v1.9.8 | 功力累計: ${aiSoul.totalLearned} 場`;
        updateOKVisuals();
    }

    function triggerSync() { document.getElementById('soul-file-input').click(); }
    function handleFileSync(event) {
        const file = event.target.files[0];
        if (!file) {
            const choice = prompt("【傳承同步導引】\n1. 砍掉重練\n2. 除舊佈新\n3. 取消動作\n輸入代號：");
            if (choice === "1") { if (confirm("確定砍掉重練？")) { aiSoul = JSON.parse(JSON.stringify(DEFAULT_SOUL)); localStorage.setItem(SOUL_KEY, JSON.stringify(aiSoul)); updateSoulUI(); alert("已重置。"); } }
            else if (choice === "2") { if (confirm("確定直接備份手札？")) { exportSoul(); alert("已備份。"); } }
            event.target.value = ""; return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                const delta = imported.totalLearned - aiSoul.totalLearned;
                if (delta > 0) {
                    for (let key in aiSoul.weights) aiSoul.weights[key] = ((aiSoul.weights[key] * aiSoul.totalLearned) + (imported.weights[key] * delta)) / imported.totalLearned;
                    aiSoul.totalLearned = imported.totalLearned;
                    localStorage.setItem(SOUL_KEY, JSON.stringify(aiSoul));
                    alert(`同步成功！`);
                }
                exportSoul(); updateSoulUI();
            } catch(err) { alert("格式錯誤。"); }
        };
        reader.readAsText(file);
        event.target.value = ""; 
    }
    function exportSoul() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(aiSoul));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `abalone_soul_${aiSoul.totalLearned}G.json`);
        downloadAnchorNode.click(); downloadAnchorNode.remove();
    }

    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const HEX_SIZE = 32; const OFFSET = { x: 275, y: 275 };
    let board = {}; let turn = 1; let selectedTail = null; let legalTargets = []; let previewTarget = null; let currentMoveInfo = null; let score = { 1: 0, 2: 0 };
    const DIRS = [{q:1,r:-1},{q:1,r:0},{q:0,r:1},{q:-1,r:1},{q:-1,r:0},{q:0,r:-1}];

    function getAllyMovingPieces() {
        if (!currentMoveInfo) return [];
        return [...currentMoveInfo.allies]; 
    }

    function updateOKVisuals() {
        const t = document.getElementById('okBtnTop'), b = document.getElementById('okBtnBottom');
        t.disabled = b.disabled = true;
        t.classList.remove('turn-glow', 'active-ready');
        b.classList.remove('turn-glow', 'active-ready');
        const activeBtn = (turn === 1 ? b : t);
        activeBtn.classList.add('turn-glow');
        if (previewTarget) {
            activeBtn.disabled = false;
            activeBtn.classList.add('active-ready');
        }
    }

    function draw() {
        ctx.clearRect(0, 0, 550, 550);
        const movingAllies = getAllyMovingPieces();

        for (let key in board) {
            let [q, r] = key.split(',').map(Number); let {x, y} = hexToPixel(q, r);
            ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.85, 0, Math.PI*2); ctx.fillStyle = "#ddd"; ctx.fill();
            
            let val = board[key];
            if (val > 0) {
                // 手術位置：僅己方棋子發光，顏色精確替換為藍光 (#00d2ff)
                if (movingAllies.some(p => p.q === q && p.r === r)) {
                    ctx.save();
                    ctx.shadowBlur = 20; ctx.shadowColor = "#00d2ff";
                    ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.75, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(0, 210, 255, 0.9)"; ctx.lineWidth = 4; ctx.stroke();
                    ctx.restore();
                }

                ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.7, 0, Math.PI*2); ctx.fillStyle = val === 1 ? "#333" : "#fff"; ctx.fill();
                let isTail = selectedTail && selectedTail.q === q && selectedTail.r === r;
                ctx.strokeStyle = isTail ? "#f1c40f" : "#000"; ctx.lineWidth = isTail ? 4 : 1; ctx.stroke();
            }
            if (legalTargets.some(t => t.q === q && t.r === r)) { ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.5, 0, Math.PI*2); ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 4; ctx.stroke(); }
            if (previewTarget && previewTarget.q === q && previewTarget.r === r) { ctx.beginPath(); ctx.arc(x, y, HEX_SIZE * 0.75, 0, Math.PI*2); ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 5; ctx.stroke(); }
        }
    }

    function setupSurrender(btnId, progressId) {
        const btn = document.getElementById(btnId);
        const progress = document.getElementById(progressId);
        let timer; let startTime; const DURATION = 3000;
        const start = (e) => { e.preventDefault(); startTime = Date.now(); timer = requestAnimationFrame(update); };
        const update = () => {
            const elapsed = Date.now() - startTime; const p = Math.min(elapsed / DURATION, 1);
            progress.style.strokeDashoffset = 141 * (1 - p);
            if (p < 1) timer = requestAnimationFrame(update); else { cancel(); if(confirm("確定要認輸嗎？")) handleSurrender(); }
        };
        const cancel = () => { cancelAnimationFrame(timer); progress.style.strokeDashoffset = 141; };
        btn.addEventListener('mousedown', start); btn.addEventListener('touchstart', start);
        window.addEventListener('mouseup', cancel); window.addEventListener('touchend', cancel);
    }
    setupSurrender('surBtnTop', 'surProgressTop');
    setupSurrender('surBtnBottom', 'surProgressBottom');

    function handleSurrender() { aiSoul.totalLearned++; localStorage.setItem(SOUL_KEY, JSON.stringify(aiSoul)); alert("認輸結算完成。"); location.reload(); }

    function handleInput(e) {
        const {x, y} = getMousePos(e); let {q, r} = pixelToHex(x, y);
        if (board[`${q},${r}`] === undefined) return;
        if (board[`${q},${r}`] === turn) { previewTarget = null; currentMoveInfo = null; selectedTail = {q, r}; calculateLegalMoves(q, r); }
        else if (legalTargets.some(t => t.q === q && t.r === r)) { currentMoveInfo = legalTargets.find(t => t.q === q && t.r === r); previewTarget = {q, r}; }
        updateOKVisuals(); draw();
    }

    function exitGame() { if(confirm("確定離開？")) window.location.href = "../../index.html"; }
    function init() {
        updateSoulUI();
        for (let q = -4; q <= 4; q++) {
            for (let r = -4; r <= 4; r++) {
                if (Math.abs(q + r) <= 4) {
                    let val = 0;
                    if (r <= -3) val = 2; if (r == -2 && (q == 0 || q == 1 || q == 2)) val = 2;
                    if (r >= 3) val = 1; if (r == 2 && (q == 0 || q == -1 || q == -2)) val = 1;
                    board[`${q},${r}`] = val;
                }
            }
        }
    }
    function hexToPixel(q, r) { return { x: HEX_SIZE * Math.sqrt(3) * (q + r/2) + OFFSET.x, y: HEX_SIZE * (3/2) * r + OFFSET.y }; }
    function pixelToHex(x, y) {
        x -= OFFSET.x; y -= OFFSET.y; let q = (Math.sqrt(3)/3 * x - 1/3 * y) / HEX_SIZE, r = (2/3 * y) / HEX_SIZE;
        let s = -q-r, rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
        let dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
        if (dq > dr && dq > ds) rq = -rr-rs; else if (dr > ds) rr = -rq-rs;
        return {q: rq, r: rr};
    }
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let x = clientX - rect.left; let y = clientY - rect.top;
        if (window.innerWidth > window.innerHeight) { let oldX = x; x = y; y = rect.width - oldX; }
        return { x: x * (550 / rect.width), y: y * (550 / rect.width) };
    }
    function calculateLegalMoves(q, r) {
        legalTargets = [];
        DIRS.forEach(dir => {
            let allies = [{q, r}]; for (let i = 1; i < 3; i++) { let cQ = q + dir.q * i, cR = r + dir.r * i; if (board[`${cQ},${cR}`] === turn) allies.push({q: cQ, r: cR}); else break; }
            let myPower = allies.length, head = allies[allies.length - 1], oppCount = 0, canMove = true;
            let scanPos = { q: head.q + dir.q, r: head.r + dir.r };
            while (board[`${scanPos.q},${scanPos.r}`] !== undefined && board[`${scanPos.q},${scanPos.r}`] !== 0) { if (board[`${scanPos.q},${scanPos.r}`] === turn) { canMove = false; break; } oppCount++; scanPos.q += dir.q; scanPos.r += dir.r; }
            if (canMove && myPower > oppCount) legalTargets.push({ q: head.q + dir.q, r: head.r + dir.r, dir, allies, oppCount });
        });
    }
    function executeMove() {
        if (!currentMoveInfo) return; let nextBoard = {...board}; const moveInfo = currentMoveInfo;
        moveInfo.allies.forEach(s => nextBoard[`${s.q},${s.r}`] = 0);
        moveInfo.allies.forEach(s => nextBoard[`${s.q + moveInfo.dir.q},${s.r + moveInfo.dir.r}`] = turn);
        if (moveInfo.oppCount > 0) {
            for (let i = moveInfo.oppCount; i >= 1; i--) {
                let oQ = moveInfo.q + moveInfo.dir.q * (i-1), oR = moveInfo.r + moveInfo.dir.r * (i-1), next = { q: oQ + moveInfo.dir.q, r: oR + moveInfo.dir.r };
                if (board[`${next.q},${next.r}`] !== undefined) nextBoard[`${next.q},${next.r}`] = (turn === 1 ? 2 : 1); else score[turn]++;
            }
        }
        board = nextBoard; selectedTail = null; legalTargets = []; previewTarget = null; currentMoveInfo = null;
        if (score[turn] >= 6) { alert(`${turn === 1 ? "黑棋" : "白棋"} 勝利！`); aiSoul.totalLearned++; localStorage.setItem(SOUL_KEY, JSON.stringify(aiSoul)); location.reload(); return; }
        turn = (turn === 1) ? 2 : 1; 
        updateOKVisuals(); draw();
        document.getElementById('status').innerText = turn === 1 ? "黑棋回合" : "白棋回合";
        document.getElementById('score').innerText = `黑 ${score[1]} : ${score[2]} 白`;
    }

    const resetBtn = document.getElementById('resetBtn');
    const progressCircle = document.getElementById('progressCircle');
    let pressTimer; let startTime; const DURATION = 2000;
    function startPress(e) { e.preventDefault(); startTime = Date.now(); pressTimer = requestAnimationFrame(updateProgress); }
    function updateProgress() {
        const elapsed = Date.now() - startTime; const p = Math.min(elapsed / DURATION, 1);
        progressCircle.style.strokeDashoffset = 126 * (1 - p);
        if (p < 1) pressTimer = requestAnimationFrame(updateProgress); else { if(confirm("確定重設？")) location.reload(); cancelPress(); }
    }
    function cancelPress() { cancelAnimationFrame(pressTimer); progressCircle.style.strokeDashoffset = 126; }
    resetBtn.addEventListener('mousedown', startPress); resetBtn.addEventListener('touchstart', startPress);
    window.addEventListener('mouseup', cancelPress); window.addEventListener('touchend', cancelPress);
    function updateLayout() {
        const wrapper = document.getElementById('app-viewport'); const w = window.innerWidth; const h = window.innerHeight;
        wrapper.style.width = `${w}px`; wrapper.style.height = `${h}px`;
        if (w > h) { wrapper.style.transform = `translate(0, 0) rotate(90deg)`; wrapper.style.width = `${h}px`; wrapper.style.height = `${w}px`; wrapper.style.left = `${(w - h) / 2}px`; wrapper.style.top = `${(h - w) / 2}px`; }
        else { wrapper.style.transform = `none`; wrapper.style.left = `0`; wrapper.style.top = `0`; }
    }
    window.addEventListener('resize', updateLayout); 
    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); });
    init(); updateLayout(); draw();
</script>
</body>
</html>
